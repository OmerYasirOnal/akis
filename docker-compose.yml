# ═══════════════════════════════════════════════════════════════════════════════
# AKIS — one-command self-host stack (like Ollama):  `docker compose up`
#
#   • app — the single bundled image (backend serves the built frontend AND the
#     API on ONE port, default 3000). HOST=0.0.0.0 so the container is reachable;
#     SERVE_STATIC=1 turns on static serving of frontend/dist.
#   • db  — postgres:16-alpine. Setting DATABASE_URL activates persistence, so
#     users + sessions + workflows survive `docker compose down && up`.
#
# SECURITY: AKIS runs AI-generated code as host child processes with NO sandbox
# (see THREAT-MODEL.md + docs/SELF_HOSTING.md). This stack is SINGLE-USER. Do NOT
# expose port 3000 to untrusted users or the public internet without your own
# isolation. The published port binds 127.0.0.1 by default for that reason.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Persistence: matches the db service creds below → users/sessions/workflows persist.
      DATABASE_URL: postgres://akis:akis@db:5432/akis
      # Bind all interfaces INSIDE the container (the backend defaults to 127.0.0.1,
      # which would be unreachable from the published port).
      HOST: "0.0.0.0"
      # Serve the bundled frontend/dist alongside the API on the same port.
      SERVE_STATIC: "1"
      PORT: "3000"
      NODE_ENV: production
      # Keyless DEMO by default: with NO provider key, AKIS runs on the deterministic
      # mock provider so a bare `docker compose up` serves a working demo. This is a
      # FALLBACK — the moment you set a provider key below (or via .env) the real
      # provider takes over; the mock never masks a configured key. Set
      # AKIS_ALLOW_MOCK=0 in your .env to opt out and require a real key (fail-closed).
      AKIS_ALLOW_MOCK: ${AKIS_ALLOW_MOCK:-1}
      # B1 — demo fail-closed: a demo flag (AKIS_ALLOW_MOCK / AKIS_DEMO_VERIFY) FAKES
      # verification (a build reaches done+preview WITHOUT real tests). In production the
      # backend refuses to boot on a demo flag UNLESS this acknowledgment is set. This
      # bundled stack IS the acknowledged keyless demo, so it defaults to 1 — and /health
      # then reports `mode:"demo"` (the FE shows a "DEMO · mock-verified" badge). When you
      # add a real provider key (AKIS_ALLOW_MOCK falls away) the demo flag is inert, mode
      # returns to "live", and this ack is irrelevant. Set it to 0 to enforce the
      # fail-closed boot in your own production deployment.
      AKIS_ALLOW_DEMO_IN_PROD: ${AKIS_ALLOW_DEMO_IN_PROD:-1}
      # ── Pass-throughs from your shell / .env (see backend/.env.example) ──
      # AUTH_JWT_SECRET signs session JWTs. Production fails closed on an EMPTY secret,
      # so this ships a working INSECURE default to keep the zero-config demo booting.
      # ⚠ OVERRIDE IT for any real use: put AUTH_JWT_SECRET=$(openssl rand -hex 32) in a
      # .env next to this file (compose auto-loads it) — also makes sessions survive
      # restarts and is required if you ever run multi-instance.
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-akis-insecure-demo-secret-change-me}
      # Browser-facing origin (OAuth + cross-site cookies). e.g. http://localhost:3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # Optional: a provider key enables REAL builds (and auto-disables the mock above).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      # Publish on the host (127.0.0.1 ONLY — single-user posture). Override the
      # host port with PORT in your environment; the container always listens on 3000.
      - "127.0.0.1:${PORT:-3000}:3000"
    volumes:
      # Persist preview workspaces + the encrypted key store across restarts.
      - akis_home:/home/node/.akis
      - akis_config:/home/node/.config/akis
    healthcheck:
      # Liveness via the cheap /health route (reserved from the SPA fallback). The
      # container always listens on 3000 (see ports note). /health is a static handler
      # (returns `{ ok, persistence, mode }` without touching the DB), so this is a LIVENESS
      # probe — it proves Fastify is up and accepting connections (catching a crashed/
      # unresponsive process that `restart: unless-stopped`, which only reacts to process
      # EXIT, would miss) and gives `docker compose ps` a real readiness signal. It does
      # NOT assert DB reachability or orchestrator health (the probe ignores the body).
      # wget ships with the node:alpine busybox; start_period covers boot + DB migrations.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akis
      POSTGRES_PASSWORD: akis
      POSTGRES_DB: akis
    volumes:
      - akis_pgdata:/var/lib/postgresql/data
    healthcheck:
      # `app` waits for this to pass (depends_on: condition: service_healthy).
      test: ["CMD-SHELL", "pg_isready -U akis -d akis"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  akis_pgdata:
  akis_home:
  akis_config:
