# ─────────────────────────────────────────────────────────────────────────────
# AKIS CI — the deterministic build gate (separate from the @claude AI-review
# workflows in claude.yml / claude-code-review.yml; this one does NOT call them).
#
# It runs the per-package checks that actually pass on a clean checkout. Each
# package's `test` script is `tsc --noEmit && vitest run`, so this gates BOTH the
# typecheck and the unit/integration suite for backend + frontend. The `shared`
# package is types-only (no vitest suite), so it gets a dedicated `pnpm -C shared
# typecheck` step. We do NOT run `pnpm -r typecheck`: it would re-run the backend +
# frontend tsc their `test` steps already cover. Node is pinned to one major (22)
# to match the Dockerfile.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test (backend, frontend)
    runs-on: ubuntu-latest
    # A throwaway Postgres so the gated migration integration test
    # (test/integration/pg-migrations.integration.test.ts) runs real DDL in CI and proves
    # the schema/constraints actually hold. Unit tests use a fake SqlClient and ignore it;
    # the test is skipped locally (AKIS_TEST_DATABASE_URL unset).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: akis
          POSTGRES_PASSWORD: akis
          POSTGRES_DB: akis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akis -d akis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version` input: pnpm/action-setup@v4 reads the pnpm version from
        # package.json's `packageManager: pnpm@9.0.0`. Specifying BOTH errors with
        # "Multiple versions of pnpm specified" (ERR_PNPM_BAD_PM_VERSION).
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Shared is types-only — gate it directly (fast fail before the heavier suites).
      - name: Shared — typecheck
        run: pnpm -C shared typecheck

      # `test` = tsc --noEmit && vitest run, per package. Backend first (heavier),
      # then frontend.
      - name: Backend — typecheck + test
        run: pnpm -C backend test
        env:
          # Enables the gated real-Postgres migration integration test (skipped without it).
          AKIS_TEST_DATABASE_URL: postgres://akis:akis@localhost:5432/akis

      - name: Frontend — typecheck + test
        run: pnpm -C frontend test

  # Ops gate: the self-host image + compose/env/docs were previously verified by
  # NOTHING in CI — that is how a build-breaking Dockerfile COPY reached main. This
  # runs the static artifact guard (fast fail) and then actually builds the bundled
  # image, so a broken Dockerfile/lockfile fails the PR instead of `docker compose up`.
  ops:
    name: ops — validate artifacts + docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate ops/self-host artifacts (static guard)
        run: bash scripts/validate-p2-artifacts.sh

      - name: Build the bundled self-host image
        run: docker build -t akis:ci .

      # Boot smoke: the unit suites run on the mock provider + injected services and
      # `docker build` only COMPILES the image — NEITHER actually BOOTS the server, so
      # default-path boot crashes (a build-breaking Dockerfile COPY, a KeyStore decrypt
      # crash-loop, an empty model to the API) repeatedly reached main green. This RUNS
      # the freshly built image KEYLESS (AKIS_ALLOW_MOCK=1 → mock provider, no key, no
      # DB → memory persistence) and probes /health, so that whole crash class fails the
      # PR loudly here. The image already defaults HOST=0.0.0.0/PORT=3000/SERVE_STATIC=1/
      # NODE_ENV=production. The container is always cleaned up (even on failure).
      - name: Boot smoke — run the image keyless and probe /health
        run: |
          set -euo pipefail
          # Always remove the container, even if a step below fails (so a re-run of the
          # job on the same runner is never blocked by a stale container).
          cleanup() { docker rm -f akis-smoke >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          docker run -d --name akis-smoke \
            -e AKIS_ALLOW_MOCK=1 \
            -e AUTH_JWT_SECRET=ci-smoke \
            -p 3000:3000 \
            akis:ci

          # Poll /health for up to ~30s (15 tries × 2s). Assert HTTP 200 AND "ok":true
          # in the body (a 200 alone could be the SPA fallback; the body proves it's the
          # real health handler). Succeed on the first good response.
          ok=0
          for i in $(seq 1 15); do
            body="$(curl -fsS --max-time 5 http://127.0.0.1:3000/health 2>/dev/null || true)"
            if printf '%s' "$body" | grep -q '"ok":true'; then
              echo "boot smoke OK (attempt $i): $body"
              ok=1
              break
            fi
            echo "waiting for /health (attempt $i/15)…"
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "::error::boot smoke FAILED — /health never returned {\"ok\":true} within ~30s"
            echo "----- docker logs akis-smoke -----"
            docker logs akis-smoke || true
            echo "----------------------------------"
            exit 1
          fi
